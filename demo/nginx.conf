worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$ssl_client_s_dn"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log info;

    sendfile    on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=10s;

    # Dashboard - GOST + RSA TLS (port 8443)
    server {
        listen 8443 ssl;
        server_name _;

        # RSA certificate (standard browsers)
        ssl_certificate     /etc/nginx/certs/nginx-rsa.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-rsa.key;

        # GOST certificate (GOST clients)
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers GOST2012-KUZNYECHIK-KUZNYECHIKOMAC:GOST2012-MAGMA-MAGMAOMAC:HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://c4-dashboard:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        }
    }

    # Exporter API - GOST mTLS (port 8444)
    server {
        listen 8444 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;

        ssl_protocols TLSv1.2;
        ssl_ciphers GOST2012-KUZNYECHIK-KUZNYECHIKOMAC:GOST2012-MAGMA-MAGMAOMAC;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://c4-config-exporter:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
        }
    }
}
