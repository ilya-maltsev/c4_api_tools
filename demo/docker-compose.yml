# C4 API Tools — Demo Environment
#
# Uses pre-built images. All services on host network.
#
# Usage:
#   docker compose up -d
#   open https://localhost:8443  (login: admin / admin)
#
# First start takes ~30s: PostgreSQL init, PKI generation, Django migrations.

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: demo-postgresql
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c listen_addresses=127.0.0.1
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring -d monitoring"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Nginx with GOST TLS ───────────────────────────────────────────
  nginx-gost:
    image: c4-nginx-gost:latest
    container_name: demo-nginx-gost
    restart: unless-stopped
    network_mode: host
    volumes:
      - certs:/etc/nginx/certs
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      c4-dashboard:
        condition: service_started

  # ── C4 Dashboard (c4_lib built-in) ────────────────────────────────
  c4-dashboard:
    image: c4-dashboard:latest
    container_name: demo-c4-dashboard
    restart: unless-stopped
    network_mode: host
    environment:
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_NAME: "monitoring"
      DB_USER: "monitoring"
      DB_PASSWORD: "monitoring"
      DASHBOARD_ADMIN_USER: "${DASHBOARD_ADMIN_USER:-admin}"
      DASHBOARD_ADMIN_PASSWORD: "${DASHBOARD_ADMIN_PASSWORD:-admin}"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "https://localhost:8443,https://127.0.0.1:8443"
      C4_HOST: "${C4_HOST:-192.168.122.200}"
      C4_PORT: "${C4_PORT:-444}"
      C4_USER: "${C4_USER:-admin}"
      C4_PASSWORD: "${C4_PASSWORD:-}"
      CONNECT_TIMEOUT: "${CONNECT_TIMEOUT:-10}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT:-300}"
    volumes:
      - certs:/etc/c4-certs:ro
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pg_data:
  certs:
