services:
  c4-config-exporter:
    build:
      context: ../../
      dockerfile: dev_env/dev-c4-config-exporter/Dockerfile
    container_name: dev-c4-config-exporter
    restart: unless-stopped
    network_mode: host
    environment:
      C4_HOST: "192.168.122.200"
      C4_PORT: "444"
      C4_USER: "admin"
      C4_PASSWORD: "AsdfgTrewq1@"
      C4_CLIENT_CERT: "/etc/c4-certs/exporter.crt"
      C4_CLIENT_KEY: "/etc/c4-certs/exporter.key"
      C4_CA_CERT: "/etc/c4-certs/ca.crt"
      C4_API_PORT: "8001"
      CONNECT_TIMEOUT: "10"
      REQUEST_TIMEOUT: "300"
    volumes:
      - ./output:/opt/output
      - certs:/etc/c4-certs:ro

volumes:
  certs:
    name: dev-c4-certs
    external: true
