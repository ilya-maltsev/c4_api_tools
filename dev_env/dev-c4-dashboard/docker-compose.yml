services:
  c4-dashboard:
    build:
      context: ../../
      dockerfile: dev_env/dev-c4-dashboard/Dockerfile
    container_name: dev-c4-dashboard
    network_mode: host
    environment:
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_NAME: "monitoring"
      DB_USER: "monitoring"
      DB_PASSWORD: "monitoring"
      DASHBOARD_ADMIN_USER: "admin"
      DASHBOARD_ADMIN_PASSWORD: "admin"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,https://127.0.0.1:8443,https://localhost:8443"
      C4_HOST: "192.168.122.200"
      C4_PORT: "444"
      C4_USER: "admin"
      C4_PASSWORD: "AsdfgTrewq1@"
      CONNECT_TIMEOUT: "10"
      REQUEST_TIMEOUT: "300"
      C4_CA_CERT: "/etc/c4-certs/ca.crt"
      C4_CLIENT_CERT: "/etc/c4-certs/dashboard.crt"
      C4_CLIENT_KEY: "/etc/c4-certs/dashboard.key"
    volumes:
      - ../../c4_dashboard:/opt/app
      - certs:/etc/c4-certs:ro

volumes:
  certs:
    name: dev-c4-certs
    external: true
