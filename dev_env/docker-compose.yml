# C4 API Tools — Dev Environment
#
# Builds from source. All services on host network. Code mounted for live-reload.
#
# Usage:
#   cd dev_env
#   docker compose up -d --build
#   open https://localhost:8443  (login: admin / admin)
#
# First start: PostgreSQL init + PKI generation + Django migrations (~60s).

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: dev-postgresql
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring -d monitoring"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Nginx with GOST TLS ───────────────────────────────────────────
  nginx-gost:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: dev-nginx-gost
    restart: unless-stopped
    network_mode: host
    volumes:
      - certs:/etc/nginx/certs
    depends_on:
      c4-dashboard:
        condition: service_started

  # ── C4 Dashboard (c4_lib built-in, code mounted) ─────────────────
  c4-dashboard:
    build:
      context: ../
      dockerfile: dev_env/dashboard/Dockerfile
    container_name: dev-c4-dashboard
    network_mode: host
    environment:
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_NAME: "monitoring"
      DB_USER: "monitoring"
      DB_PASSWORD: "monitoring"
      DASHBOARD_ADMIN_USER: "admin"
      DASHBOARD_ADMIN_PASSWORD: "admin"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,https://127.0.0.1:8443,https://localhost:8443"
      C4_HOST: "${C4_HOST:-192.168.122.200}"
      C4_PORT: "${C4_PORT:-444}"
      C4_USER: "${C4_USER:-admin}"
      C4_PASSWORD: "${C4_PASSWORD:-}"
      CONNECT_TIMEOUT: "${CONNECT_TIMEOUT:-10}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT:-300}"
      C4_CA_CERT: "/etc/c4-certs/ca.crt"
      C4_CLIENT_CERT: "/etc/c4-certs/dashboard.crt"
      C4_CLIENT_KEY: "/etc/c4-certs/dashboard.key"
    volumes:
      - ../c4_dashboard:/opt/app
      - certs:/etc/c4-certs:ro
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pg_data:
  certs:
    name: dev-c4-certs
    external: true
